# CI workflow — builds, tests, and gates merges to main
name: CI

on:
  push:
    branches: [main, dev, test, 'hotfix/**']
    paths-ignore:
      - '.github/workflows/ai-triage.yml'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/cleanup-dev-versions.yml'
      - 'LICENSE'
  pull_request:
    branches: [main, dev, test]
    paths-ignore:
      - '.github/workflows/ai-triage.yml'
      - '.github/workflows/build-native.yml'
      - '.github/workflows/cleanup-dev-versions.yml'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      full_windows_e2e:
        description: "Run the full Windows e2e suite"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    timeout-minutes: 2
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
      heavy-code-changed: ${{ steps.check.outputs.heavy-code-changed }}
      portability-changed: ${{ steps.check.outputs.portability-changed }}
      windows-e2e-changed: ${{ steps.check.outputs.windows-e2e-changed }}
      docker-changed: ${{ steps.check.outputs.docker-changed }}
      studio-changed: ${{ steps.check.outputs.studio-changed }}
      rtk-changed: ${{ steps.check.outputs.rtk-changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if only documentation changed
        id: check
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
          fi
          FILES=$(git diff --name-only "$BASE" "$HEAD_SHA" 2>/dev/null || git diff --name-only HEAD~1)
          echo "Changed files:"
          echo "$FILES"
          NON_DOCS=$(echo "$FILES" | grep -vE '\.(md|markdown)$' | grep -vE '^docs/' | grep -vE '^LICENSE$' || true)
          if [ -z "$NON_DOCS" ]; then
            echo "docs-only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Only documentation files changed — skipping build/test"
          else
            echo "docs-only=false" >> "$GITHUB_OUTPUT"
            echo "Non-docs files changed:"
            echo "$NON_DOCS"
          fi
          HEAVY_CODE=$(echo "$NON_DOCS" | grep -E '^(src/|packages/|native/|scripts/|web/|studio/|extensions/|tests/|Dockerfile$|docker/|package\.json$|package-lock\.json$|tsconfig[^/]*\.json$|packages/.*/tsconfig\.json$)' || true)
          if [ -n "$HEAVY_CODE" ]; then
            echo "heavy-code-changed=true" >> "$GITHUB_OUTPUT"
            echo "Build/runtime-relevant files changed:"
            echo "$HEAVY_CODE"
          else
            echo "heavy-code-changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No build/runtime-relevant changes detected — skipping heavy build/test jobs"
          fi
          PORTABILITY=$(echo "$NON_DOCS" | grep -E '^(src/|packages/|native/|scripts/|web/|package\.json$|package-lock\.json$|web/package-lock\.json$|tsconfig[^/]*\.json$|packages/.*/tsconfig\.json$)' || true)
          if [ -n "$PORTABILITY" ]; then
            echo "portability-changed=true" >> "$GITHUB_OUTPUT"
            echo "Portability-relevant files changed:"
            echo "$PORTABILITY"
          else
            echo "portability-changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No portability-relevant changes detected — skipping portability matrix jobs"
          fi
          WINDOWS_E2E=$(echo "$NON_DOCS" | grep -E '^(tests/e2e/|src/(loader|rtk|rtk/|native|native/|resources/extensions/gsd/gsd-db|resources/extensions/gsd/extension-host|resources/extensions/gsd/auto-worktree|resources/extensions/gsd/workflow-mcp)|packages/(pi-coding-agent|pi-ai|pi-agent-core|native|mcp-server|rpc-client)/|native/|package\.json$|package-lock\.json$|tsconfig[^/]*\.json$|packages/.*/tsconfig\.json$)' || true)
          if [ -n "$WINDOWS_E2E" ]; then
            echo "windows-e2e-changed=true" >> "$GITHUB_OUTPUT"
            echo "Windows e2e-relevant files changed:"
            echo "$WINDOWS_E2E"
          else
            echo "windows-e2e-changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Windows e2e-relevant changes detected — skipping Windows e2e"
          fi
          DOCKER=$(echo "$NON_DOCS" | grep -E '^(Dockerfile$|docker/|scripts/install\.js$|scripts/.*\.cjs$|scripts/.*\.mjs$|package\.json$|package-lock\.json$|src/|packages/|tests/e2e/docker/)' || true)
          if [ -n "$DOCKER" ]; then
            echo "docker-changed=true" >> "$GITHUB_OUTPUT"
            echo "Docker-relevant files changed:"
            echo "$DOCKER"
          else
            echo "docker-changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Docker-relevant changes detected — skipping docker-e2e"
          fi
          STUDIO=$(echo "$NON_DOCS" | grep -E '^studio/' || true)
          if [ -n "$STUDIO" ]; then
            echo "studio-changed=true" >> "$GITHUB_OUTPUT"
            echo "Studio-relevant files changed:"
            echo "$STUDIO"
          else
            echo "studio-changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Studio-relevant changes detected — skipping studio-e2e"
          fi
          RTK=$(echo "$NON_DOCS" | grep -E '^(src/rtk|src/rtk/|src/tests/rtk|src/tests/postinstall\.test\.ts|src/tests/app-smoke\.test\.ts|src/resources/extensions/gsd/tests/custom-verification\.test\.ts|src/resources/extensions/gsd/tests/verification-gate\.test\.ts|scripts/install\.js|package\.json$|package-lock\.json$)' || true)
          if [ -n "$RTK" ]; then
            echo "rtk-changed=true" >> "$GITHUB_OUTPUT"
            echo "RTK-relevant files changed:"
            echo "$RTK"
          else
            echo "rtk-changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No RTK-relevant changes detected — skipping RTK portability matrix"
          fi

  docs-check:
    timeout-minutes: 5
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan documentation for prompt injection
        run: bash scripts/docs-prompt-injection-scan.sh --diff origin/main

  lint:
    timeout-minutes: 5
    needs: detect-changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Scan for hardcoded secrets
        run: bash scripts/secret-scan.sh --diff origin/main

      - name: Scan for base64-encoded secrets
        run: bash scripts/base64-scan.sh --diff origin/main

      - name: Ensure .gsd/ is not checked in
        run: |
          if [ -d ".gsd" ]; then
            echo "::error::.gsd/ directory must not be checked in"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate skill references
        run: node scripts/check-skill-references.mjs

      - name: Require tests with source changes
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/require-tests.sh

      - name: Reject source-grep tests
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/check-source-grep-tests.sh

      - name: CodeRabbit-theme self-tests
        run: node --test scripts/__tests__/check-coderabbit-themes.test.mjs

      - name: Reject recurring CodeRabbit themes
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-coderabbit-themes.mjs

  ci-circuit-breaker-fast:
    timeout-minutes: 2
    needs: [detect-changes, docs-check, lint]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    steps:
      - name: Stop pipeline when fast gates fail
        env:
          DOCS_CHECK: ${{ needs.docs-check.result }}
          LINT: ${{ needs.lint.result }}
        run: |
          if [ "$DOCS_CHECK" != "success" ] || [ "$LINT" != "success" ]; then
            echo "::error::Fast gate failed (docs-check=$DOCS_CHECK, lint=$LINT). Cancelling follow-on CI jobs."
            exit 1
          fi

  mergeability-gate:
    timeout-minutes: 2
    needs: [detect-changes, ci-circuit-breaker-fast]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      skip-heavy-jobs: ${{ steps.gate.outputs.skip-heavy-jobs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine whether heavy CI should be skipped
        id: gate
        uses: actions/github-script@v8
        env:
          EVENT_NAME: ${{ github.event_name }}
        with:
          script: |
            const eventName = process.env.EVENT_NAME;
            let mergeableState = "unknown";

            if (eventName === "pull_request") {
              for (let i = 0; i < 6; i++) {
                const { data } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                });

                mergeableState = data.mergeable_state ?? "unknown";
                if (mergeableState !== "unknown") break;
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }

            const { shouldSkipHeavyJobs } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/ci/mergeability-gate.mjs`);
            const skipHeavyJobs = shouldSkipHeavyJobs({ eventName, mergeableState });
            core.info(`mergeable_state=${mergeableState}; skip-heavy-jobs=${skipHeavyJobs}`);
            core.setOutput("skip-heavy-jobs", skipHeavyJobs ? "true" : "false");

  build:
    timeout-minutes: 25
    needs: [detect-changes, ci-circuit-breaker-fast, mergeability-gate]
    if: needs.detect-changes.outputs.heavy-code-changed == 'true' && needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web host dependencies
        run: npm --prefix web ci

      - name: Cache Next.js build
        uses: useblacksmith/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/app/**', 'web/components/**', 'web/lib/**', 'web/hooks/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build core
        run: npm run build:core

      - name: Build web host
        run: npm run build:web-host

      - name: Typecheck extensions
        run: npm run typecheck:extensions

      - name: Validate package is installable
        run: npm run validate-pack

      - name: Verify workspace coverage (every linkable package has tests)
        run: npm run verify:workspace-coverage

      - name: Run unit tests
        run: |
          npm run test:compile
          npm run test:unit:compiled

      - name: Run package tests
        run: npm run test:packages

      - name: Check test coverage thresholds
        run: npm run test:coverage

  ci-circuit-breaker-build:
    timeout-minutes: 2
    needs: [detect-changes, build, mergeability-gate]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always() && needs.detect-changes.outputs.heavy-code-changed == 'true' && needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    steps:
      - name: Stop pipeline when build gate fails
        env:
          BUILD: ${{ needs.build.result }}
        run: |
          if [ "$BUILD" != "success" ]; then
            echo "::error::Build gate failed (build=$BUILD). Cancelling follow-on CI jobs."
            exit 1
          fi

  integration-tests:
    timeout-minutes: 15
    needs: [detect-changes, ci-circuit-breaker-build, mergeability-gate]
    if: needs.detect-changes.outputs.heavy-code-changed == 'true' && needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Integration tests need core compiled artifacts:
      # - dist/loader.js and packages/pi-coding-agent/dist/** from `npm run build:core`
      # - web/node_modules/.bin/next for tests that shell `build:web-host` at runtime
      # Duplicating the core build here (instead of sharing artifacts via needs: build)
      # preserves wall-clock parallelism with the build job — see PR #4093.
      - name: Install web host dependencies
        run: npm --prefix web ci

      - name: Cache Next.js build
        uses: useblacksmith/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/app/**', 'web/components/**', 'web/lib/**', 'web/hooks/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build core
        run: npm run build:core

      - name: Run integration tests
        run: npm run test:integration

  live-regression:
    # Runs the same tests/live-regression suite that Dev Verify runs
    # post-publish, but pointed at the locally-built dist/loader.js so
    # regressions surface on the PR instead of in the manual Dev Publish
    # workflow. Mirrors the Dev Publish smoke step at dev-publish.yml:84-88.
    # No untrusted GitHub event input is consumed in run: blocks.
    timeout-minutes: 10
    needs: [detect-changes, ci-circuit-breaker-build, mergeability-gate]
    if: needs.detect-changes.outputs.heavy-code-changed == 'true' && needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Run live regression (against built binary)
        run: |
          chmod +x dist/loader.js
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          npm run test:live-regression

  e2e:
    # Real-process e2e tests in tests/e2e/. Spawns the built dist/loader.js
    # through the shared harness in tests/e2e/_shared/. This is where new
    # cross-process flows land (fake-LLM agent loops, MCP server, native
    # ABI, migration chain, etc.) - see tests/e2e/README.md.
    # No untrusted GitHub event input is consumed in run: blocks.
    timeout-minutes: 15
    needs: [detect-changes, ci-circuit-breaker-build, mergeability-gate]
    if: needs.detect-changes.outputs.heavy-code-changed == 'true' && needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Run e2e suite (against built binary)
        run: |
          chmod +x dist/loader.js
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          npm run test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7

  ci-circuit-breaker-linux-runtime:
    timeout-minutes: 2
    needs: [detect-changes, mergeability-gate, integration-tests, live-regression, e2e]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always() && needs.detect-changes.outputs.heavy-code-changed == 'true' && needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    steps:
      - name: Stop expanded CI when Linux runtime fails
        env:
          INTEGRATION_TESTS: ${{ needs.integration-tests.result }}
          LIVE_REGRESSION: ${{ needs.live-regression.result }}
          E2E: ${{ needs.e2e.result }}
        run: |
          failed=0
          for check in \
            "integration-tests=$INTEGRATION_TESTS" \
            "live-regression=$LIVE_REGRESSION" \
            "e2e=$E2E"
          do
            result="${check#*=}"
            if [ "$result" != "success" ]; then
              echo "::error::Linux runtime gate failed ($check). Cancelling expanded CI jobs."
              failed=1
            fi
          done
          exit "$failed"

  docker-e2e:
    # Builds the runtime-local Dockerfile target from the current source
    # (npm pack + COPY into image) and runs `gsd --version` inside the
    # container. Catches missing system deps, broken postinstall, missing
    # tarball files. Gated by detect-changes so doc-only PRs skip it.
    # No untrusted GitHub event input is consumed in run: blocks.
    timeout-minutes: 20
    needs: [detect-changes, ci-circuit-breaker-linux-runtime, mergeability-gate]
    if: >-
      needs.detect-changes.outputs.heavy-code-changed == 'true' &&
      needs.detect-changes.outputs.docker-changed == 'true' &&
      needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        # `npm pack` does not run prepublishOnly, so we must build dist/
        # explicitly before packing — otherwise the tarball ships without
        # the loader and the runtime-local Dockerfile target can't find
        # the entry point.
        run: npm run build:core

      - name: Run docker e2e suite
        run: npm run test:e2e:docker

  e2e-windows-full:
    # Full Windows e2e is still exploratory. It has previously hung after
    # fake-LLM failures while child services remained alive, so keep it
    # manual until that suite is stable enough to promote.
    #
    # ci-circuit-breaker-linux-runtime is intentionally excluded from needs:
    # if it were included and got skipped (heavy-code-changed=false), this job
    # would also be silently skipped even on explicit workflow_dispatch, breaking
    # the "human override always runs" contract.
    timeout-minutes: 25
    needs: [detect-changes, mergeability-gate]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.full_windows_e2e == 'true' &&
      needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-windows-2025
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Run full e2e suite (against built binary)
        shell: bash
        run: |
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          npm run test:e2e

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-windows-full
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7

  studio-e2e:
    # Studio Electron app launch-only e2e. Verifies the app launches into
    # one window, the renderer DOM mounts, and there are no uncaught errors
    # during boot. Scope is intentionally narrow per peer review — Studio
    # has no shipped features yet, so feature-level e2e tests scaffolding,
    # not product. Expand once Studio ships features.
    #
    # No untrusted GitHub event input is consumed in run: blocks.
    timeout-minutes: 15
    needs: [detect-changes, ci-circuit-breaker-linux-runtime, mergeability-gate]
    if: >-
      needs.detect-changes.outputs.heavy-code-changed == 'true' &&
      needs.detect-changes.outputs.studio-changed == 'true' &&
      needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (electron driver)
        run: npx playwright install --with-deps chromium

      - name: Build studio
        run: npm run build -w @gsd/studio

      - name: Run studio launch e2e (xvfb)
        run: xvfb-run --auto-servernum npm run test:e2e -w @gsd/studio

  windows-portability:
    # Consolidates the blocking Windows portability checks with the
    # non-blocking Windows e2e smoke suite. When both path filters match, this
    # avoids a second Windows runner, npm install, and build:core invocation.
    timeout-minutes: 25
    needs: [detect-changes, ci-circuit-breaker-linux-runtime, mergeability-gate]
    if: >-
      needs.detect-changes.outputs.heavy-code-changed == 'true' &&
      (needs.detect-changes.outputs.portability-changed == 'true' ||
       needs.detect-changes.outputs.windows-e2e-changed == 'true') &&
      needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-windows-2025
    outputs:
      smoke_result: ${{ steps.windows-smoke-e2e.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci

      - name: Build core
        run: npm run build:core

      - name: Typecheck extensions
        if: needs.detect-changes.outputs.portability-changed == 'true'
        run: npm run typecheck:extensions

      - name: Run package tests
        if: needs.detect-changes.outputs.portability-changed == 'true'
        run: npm run test:packages

      - name: Run Windows portability tests
        if: needs.detect-changes.outputs.portability-changed == 'true'
        run: >-
          node --import ./src/resources/extensions/gsd/tests/resolve-ts.mjs
          --experimental-strip-types --test
          src/tests/windows-portability.test.ts
          src/resources/extensions/gsd/tests/validate-directory.test.ts
          src/tests/integration/web-mode-windows-hide.test.ts

      - name: Run Windows e2e smoke suite (non-blocking)
        id: windows-smoke-e2e
        if: needs.detect-changes.outputs.windows-e2e-changed == 'true'
        timeout-minutes: 10
        shell: bash
        continue-on-error: true
        run: |
          export GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          npm run test:e2e:windows-smoke

      - name: Upload Windows e2e artifacts on failure
        if: steps.windows-smoke-e2e.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-windows
          path: test-results/e2e
          if-no-files-found: ignore
          retention-days: 7

  e2e-windows:
    # Compatibility/status shim to preserve the historical e2e-windows check
    # name while the smoke suite runs in windows-portability. Reflects the
    # smoke step outcome so the failure signal is not swallowed by the
    # upstream job's continue-on-error step. The job itself remains
    # non-blocking via continue-on-error.
    timeout-minutes: 5
    needs: [detect-changes, mergeability-gate, windows-portability]
    if: >-
      always() &&
      needs.detect-changes.outputs.heavy-code-changed == 'true' &&
      needs.detect-changes.outputs.windows-e2e-changed == 'true' &&
      needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    continue-on-error: true

    steps:
      - name: Report Windows smoke outcome
        env:
          PORTABILITY_RESULT: ${{ needs.windows-portability.result }}
          SMOKE_RESULT: ${{ needs.windows-portability.outputs.smoke_result }}
        run: |
          echo "Windows e2e smoke runs in windows-portability."
          echo "windows-portability result: $PORTABILITY_RESULT"
          echo "Smoke step outcome: ${SMOKE_RESULT:-<unset>}"
          # If the upstream job failed/cancelled before the smoke step ran,
          # surface that instead of mis-reporting it as "did not run".
          if [ -z "$SMOKE_RESULT" ] && [ "$PORTABILITY_RESULT" != "success" ] && [ "$PORTABILITY_RESULT" != "skipped" ]; then
            echo "::warning::windows-portability ended in $PORTABILITY_RESULT before Windows e2e smoke ran (non-blocking). See windows-portability logs."
            exit 1
          fi
          case "${SMOKE_RESULT:-skipped}" in
            success)
              echo "::notice::Windows e2e smoke succeeded."
              ;;
            failure)
              echo "::warning::Windows e2e smoke failed (non-blocking). See windows-portability artifacts."
              exit 1
              ;;
            skipped)
              echo "::notice::Windows e2e smoke did not run (no relevant changes)."
              ;;
            *)
              echo "::notice::Windows e2e smoke outcome: $SMOKE_RESULT"
              ;;
          esac

  rtk-portability:
    timeout-minutes: 20
    needs: [detect-changes, ci-circuit-breaker-linux-runtime, mergeability-gate]
    if: >-
      needs.detect-changes.outputs.heavy-code-changed == 'true' &&
      needs.detect-changes.outputs.rtk-changed == 'true' &&
      needs.mergeability-gate.outputs.skip-heavy-jobs != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: blacksmith-4vcpu-ubuntu-2404
          - label: windows
            os: blacksmith-4vcpu-windows-2025
          - label: macos
            os: macos-15
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: matrix.label != 'windows'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Node.js (Windows, no npm cache)
        if: matrix.label == 'windows'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci

      - name: Validate managed RTK install
        run: >-
          node --experimental-strip-types --input-type=module -e
          "const mod = await import('./src/rtk/rtk.ts').catch(() => import('./src/rtk.ts'));
          const result = await mod.ensureRtkAvailable();
          if (!result.available || !result.binaryPath || !mod.validateRtkBinary(result.binaryPath)) {
            console.error('Managed RTK validation failed:', result);
            process.exit(1);
          }
          console.log('Managed RTK validated at', result.binaryPath, 'via', result.source);"

      - name: Run RTK-focused portability tests
        run: >-
          node --import ./src/resources/extensions/gsd/tests/resolve-ts.mjs
          --experimental-strip-types --experimental-test-isolation=process --test
          src/tests/rtk.test.ts
          src/tests/rtk-execution-seams.test.ts
          src/tests/postinstall.test.ts
          src/tests/app-smoke.test.ts
          src/resources/extensions/gsd/tests/custom-verification.test.ts
          src/resources/extensions/gsd/tests/verification-gate.test.ts

      - name: Generate RTK benchmark evidence
        if: matrix.label == 'linux'
        run: node scripts/rtk-benchmark.mjs --output .artifacts/rtk-benchmark.md

      - name: Upload RTK benchmark artifact
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: rtk-benchmark-linux
          path: .artifacts/rtk-benchmark.md
