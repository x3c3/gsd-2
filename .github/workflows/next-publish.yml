name: Next Publish

# Manual pre-release. Click "Run workflow" in the Actions tab to stamp a
# version and publish @next to npm. Optional approval gate via the `next`
# GitHub Environment (configure reviewers in repo Settings -> Environments).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to publish as @next'
        required: false
        default: 'next'

concurrency:
  group: next-publish-${{ github.event.inputs.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  next-publish:
    name: Next Publish
    # npm trusted publishing requires GitHub-hosted runners for OIDC.
    runs-on: ubuntu-latest
    environment: next
    container:
      image: ghcr.io/gsd-build/gsd-ci-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_REPO_NAME: ${{ github.repository }}
    outputs:
      next-version: ${{ steps.stamp.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify trusted publishing toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('Trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('Trusted publishing requires npm >= 11.5.1'); }"

      - name: Install web host dependencies
        run: npm --prefix web ci

      - name: Cache Next.js build
        uses: useblacksmith/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/app/**', 'web/components/**', 'web/lib/**', 'web/hooks/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build core
        run: npm run build:core

      - name: Build web host
        run: npm run build:web-host

      - name: Stamp next version and sync platform packages
        id: stamp
        env:
          VERSION_CHANNEL: next
        run: |
          npm run pipeline:version-stamp
          npm run sync-platform-versions
          echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          npm run test:smoke

      - name: Publish @next
        run: |
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          if npm view "gsd-pi@${VERSION}" version 2>/dev/null; then
            echo "::error::Version ${VERSION} already exists. Trusted publishing only authenticates npm publish, not dist-tag mutation."
            echo "::error::Move the tag manually if intended: npm dist-tag add gsd-pi@${VERSION} next"
            exit 1
          else
            npm publish --tag next
          fi

  next-verify:
    name: Next Verify (installed package)
    needs: next-publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install published gsd-pi@next globally (with registry propagation retry)
        env:
          NEXT_VERSION: ${{ needs.next-publish.outputs.next-version }}
        run: |
          for i in 1 2 3 4 5 6; do
            npm install -g "gsd-pi@${NEXT_VERSION}" && exit 0
            echo "Attempt $i failed — waiting 10s for npm registry propagation..."
            sleep 10
          done
          echo "::error::Failed to install gsd-pi@${NEXT_VERSION} after 6 attempts. The @next tag may point at a broken artifact — deprecate it with: npm deprecate gsd-pi@${NEXT_VERSION} 'broken build'"
          exit 1

      - name: Run smoke tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          npm run test:smoke

      - name: Install repo dependencies (for regression harness)
        run: npm ci

      - name: Run live regression tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          npm run test:live-regression

      - name: Warn on verify failure
        if: failure()
        env:
          NEXT_VERSION: ${{ needs.next-publish.outputs.next-version }}
        run: |
          echo "::error::Post-publish verification failed for gsd-pi@${NEXT_VERSION}. The @next tag still points at this version on npm."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) deprecate the broken version with 'npm deprecate gsd-pi@${NEXT_VERSION} \"broken build; see Actions run\"', (3) cut a fix and re-run Next Publish."
          exit 1
