# Project/App: GSD-2
# File Purpose: Triage new and updated issues and pull requests.

name: AI Triage

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ai-triage-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  triage:
    if: ${{ github.event_name != 'issue_comment' || (github.event.comment.user.type != 'Bot' && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR') && contains(github.event.comment.body, '/rerun-triage')) }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            VISION.md
            CONTRIBUTING.md
            scripts/ai-triage-policy.mjs
          sparse-checkout-cone-mode: false

      - name: Triage with model
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const {
              CANONICAL_TRIAGE_LABELS,
              TRIAGE_LABEL_COLORS,
              TRIAGE_LABEL_DESCRIPTIONS,
              normalizeTriageResult
            } = await import(`${process.cwd()}/scripts/ai-triage-policy.mjs`);
            const vision = fs.readFileSync('VISION.md', 'utf8');
            const contributing = fs.readFileSync('CONTRIBUTING.md', 'utf8');

            const isIssueComment = context.eventName === 'issue_comment';
            const isPullRequestComment = !!context.payload.issue?.pull_request;
            const isIssue = !!context.payload.issue && !isPullRequestComment;
            const item = context.payload.issue || context.payload.pull_request;
            const number = item.number;
            const title = item.title;
            const body = item.body || '';
            const type = isIssue ? 'issue' : 'pull_request';
            const latestComment = isIssueComment ? (context.payload.comment?.body || '') : '';
            let existingLabels = (item.labels || []).map(l => l.name);

            async function ensureCanonicalLabels(labels) {
              for (const label of labels) {
                if (!TRIAGE_LABEL_COLORS[label]) continue;
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: TRIAGE_LABEL_COLORS[label],
                    description: TRIAGE_LABEL_DESCRIPTIONS[label]
                  });
                  core.info(`Created canonical triage label: ${label}`);
                } catch (e) {
                  if (e.status !== 422) throw e;
                }
              }
            }

            const isNewIssue = context.eventName === 'issues' && context.payload.action === 'opened';
            const hasCanonicalTriageStatus = existingLabels.some(label =>
              CANONICAL_TRIAGE_LABELS.includes(label)
            );

            // Ensure new issues enter the canonical triage queue when no triage status exists.
            if (isNewIssue && !hasCanonicalTriageStatus) {
              await ensureCanonicalLabels(['needs-triage']);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: ['needs-triage']
              });
              existingLabels.push('needs-triage');
              core.info('Added default label: needs-triage');
            }

            const prompt = `You are a GitHub issue/PR triage bot for the GSD-2 project. Your job is to:
            1. Classify the ${type} with appropriate labels
            2. Detect if it violates project guidelines

            <vision>
            ${vision}
            </vision>

            <contributing>
            ${contributing}
            </contributing>

            <${type}>
            Title: ${title}
            Body: ${body}
            Existing labels: ${existingLabels.join(', ') || 'none'}
            ${latestComment ? `Latest comment: ${latestComment}` : ''}
            </${type}>

            Available labels for classification (pick 1-3 that fit):
            - bug: Something isn't working
            - enhancement: New feature or request
            - documentation: Improvements or additions to documentation
            - performance: Performance improvement
            - refactor: Code restructuring without behavior change
            - tech-debt: Technical debt reduction
            - question: Further information is requested
            - good first issue: Good for newcomers

            Available triage status labels (pick exactly 1 as triage_status):
            - needs-triage: Maintainer needs to evaluate this issue
            - needs-info: Waiting for reporter information
            - ready-for-agent: Fully specified, ready for an AFK agent
            - ready-for-human: Requires human implementation
            - wontfix: Will not be actioned

            Available priority labels (pick exactly 1 if you can assess priority):
            - High Priority
            - Medium Priority
            - Low Priority

            Respond in this exact JSON format:
            {
              "labels": ["label1", "label2"],
              "triage_status": "needs-triage",
              "aligned": true,
              "violation_type": null,
              "explanation": null
            }

            Set "aligned" to false if the ${type} clearly violates project guidelines. Violation types:
            - "enterprise-patterns": Enterprise patterns (DI containers, abstract factories, etc.)
            - "framework-swap": Rewriting working code in a different framework without measurable improvement
            - "cosmetic-refactor": Pure formatting/renaming churn with no user value
            - "complexity-without-value": Adds abstraction/indirection without user-visible improvement
            - "heavy-orchestration": Duplicates what agent infrastructure already provides
            - "missing-info": Issue is too vague to act on (no repro steps, no context)
            - "off-topic": Not related to GSD-2 at all
            - "security-in-public": Appears to report a security vulnerability publicly

            If aligned is false, provide a brief, polite explanation (2-3 sentences) of why this was flagged.

            Be generous in your assessment — only flag clear violations. Ambiguous cases should be marked as aligned.
            Do NOT flag issues/PRs that are legitimately reporting bugs or requesting features, even if they could be better written.`;

            if (!process.env.ANTHROPIC_API_KEY) {
              core.warning('Skipping AI triage because ANTHROPIC_API_KEY is not configured.');
              return;
            }

            let result;
            try {
              const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'content-type': 'application/json',
                  'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                  model: 'claude-haiku-4-5-20251001',
                  max_tokens: 1024,
                  messages: [{ role: 'user', content: prompt }]
                }),
                signal: AbortSignal.timeout(20000)
              });

              if (!response.ok) {
                const err = await response.text();
                core.warning(`Skipping AI triage after Anthropic API error: ${response.status} ${err}`);
                return;
              }

              const data = await response.json();
              const text = data.content?.[0]?.text ?? '';

              // Extract JSON from response (handle markdown code blocks)
              const fenced = text.match(/```json\s*([\s\S]*?)\s*```/i);
              const loose = text.match(/\{[\s\S]*?\}/);
              const jsonText = fenced?.[1] ?? loose?.[0];
              if (!jsonText) {
                core.warning(`Skipping AI triage because the model response was not parseable JSON: ${text}`);
                return;
              }

              result = JSON.parse(jsonText);
            } catch (e) {
              core.warning(`Skipping AI triage after unexpected failure: ${e.message}`);
              return;
            }
            const normalized = normalizeTriageResult(result, existingLabels);
            result.labels = normalized.labels;
            core.info(`Triage result: ${JSON.stringify(result, null, 2)}`);

            for (const label of normalized.labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  name: label
                });
                existingLabels = existingLabels.filter(existing => existing !== label);
                core.info(`Removed stale triage label: ${label}`);
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }

            // Apply labels
            const labelsToAdd = result.labels.filter(l => !existingLabels.includes(l));
            if (labelsToAdd.length > 0) {
              await ensureCanonicalLabels(labelsToAdd);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: labelsToAdd
              });
              core.info(`Added labels: ${labelsToAdd.join(', ')}`);
            }

            // Flag misaligned issues/PRs
            if (!result.aligned) {
              // Add needs-review label
              await ensureCanonicalLabels(['needs-review']);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                labels: ['needs-review']
              });

              const violationNames = {
                'enterprise-patterns': 'Enterprise patterns',
                'framework-swap': 'Framework swap',
                'cosmetic-refactor': 'Cosmetic refactor',
                'complexity-without-value': 'Complexity without user value',
                'heavy-orchestration': 'Heavy orchestration layer',
                'missing-info': 'Missing information',
                'off-topic': 'Off-topic',
                'security-in-public': 'Security report in public'
              };

              const securityNote = result.violation_type === 'security-in-public'
                ? `\n\n**If this is a security vulnerability, please delete this ${type} and use [GitHub\'s private vulnerability reporting](https://github.com/gsd-build/GSD-2/security/advisories/new) instead.** See [CONTRIBUTING.md](https://github.com/gsd-build/GSD-2/blob/main/CONTRIBUTING.md#security) for details.`
                : '';

              const marker = '<!-- gsd-triage-bot:misalignment -->';
              const comment = `${marker}
            👋 Thanks for opening this ${type}!

            This was automatically flagged for maintainer review.

            **Flag:** ${violationNames[result.violation_type] || result.violation_type}

            ${result.explanation}

            Please review our [VISION.md](https://github.com/gsd-build/GSD-2/blob/main/VISION.md) and [CONTRIBUTING.md](https://github.com/gsd-build/GSD-2/blob/main/CONTRIBUTING.md) for project guidelines.${securityNote}

            A maintainer will review this shortly. If you believe this was flagged in error, no action is needed — we'll take a look.

            ---
            *This is an automated triage. The maintainers make all final decisions.*`;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                per_page: 100
              });
              const existingBotComment = comments.find(c => (c.body || '').includes(marker));

              if (existingBotComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingBotComment.id,
                  body: comment
                });
                core.info(`Updated existing misalignment comment: ${existingBotComment.id}`);
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  body: comment
                });
                core.info('Created misalignment comment');
              }
              core.info(`Flagged as misaligned: ${result.violation_type}`);
            }
